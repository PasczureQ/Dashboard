<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaszczureQ — Digital Studio | Games, Brands & Digital Experiences</title>
    <meta name="description" content="Engineering immersive digital experiences, Roblox games, and brands. Explore the portfolio of PaszczureQ — a premium digital studio." />
    <meta name="author" content="PaszczureQ" />
    <meta property="og:title" content="PaszczureQ — Digital Studio" />
    <meta property="og:description" content="Engineering immersive digital experiences, Roblox games, and brands." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0A0A0A;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #loading-screen.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-line {
        width: 120px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .loader-line::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 40%;
        background: #B30000;
        border-radius: 2px;
        animation: loaderSlide 0.8s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(179,0,0,0.6);
      }
      @keyframes loaderSlide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-line"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
